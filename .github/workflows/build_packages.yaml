name: Build packages

concurrency:
  group: build-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-docker-images:
    runs-on: ubuntu-24.04
    if: github.repository == 'muleml/ekuiper'

    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/setup-qemu-action@v3
      with:
        image: tonistiigi/binfmt:qemu-v9.2.2-52
        platforms: all
    - name: Login GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build image full
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        pull: true
        push: false
        load: true
        tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:full
        build-args: GO_VERSION=1.25.4
        file: deploy/docker/Dockerfile-full
    - name: Test docker image
      run: |
        docker rm -f ekuiper >/dev/null 2>&1 || true
        docker run -d --name ekuiper ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:full
        ip_address=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' ekuiper)
        sleep 5
        for i in $(seq 1 30); do
          if curl -fsS "http://${ip_address}:9081/ping" >/dev/null; then
            exit 0
          fi
          sleep 1
        done
        docker logs ekuiper
        exit 1

    - name: Push image full
      if: github.event_name != 'pull_request'
      run: docker push ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:full
