name: Build muleml base image

permissions:
  contents: read
  packages: write

## Update the base image every month and every change in the dockerfiles
on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - .github/dockerfile/**
      - .github/workflows/build_base_image.yaml
  pull_request:
    branches: [ main ]
    paths:
      - .github/dockerfile/**
      - .github/workflows/build_base_image.yaml

## Build base images to be used by other github workflows
jobs:

  build:
    runs-on: ubuntu-24.04
    if: github.repository == 'muleml/ekuiper'

    strategy:
      fail-fast: false
      matrix:
        os:
          - debian
          - alpine
        golang:
          - 1.25.4

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v9.2.2-52
      - uses: actions/cache@v3
        with:
          path: /tmp/.docker-buildx-cache
          key: docker-buildx-${{ matrix.golang }}-${{ matrix.os }}
      - name: Docker login
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          # do not push image on PR events, if the PR is accepted then the workflow can push the new image
          push: ${{ github.event_name != 'pull_request' }}
          pull: true
          cache-from: type=local,src=/tmp/.docker-buildx-cache,mode=max
          cache-to: type=local,dest=/tmp/.docker-buildx-cache-new,mode=max
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: GO_VERSION=${{ matrix.golang }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-base:${{ matrix.golang }}-${{ matrix.os }}
          file: .github/dockerfile/Dockerfile.${{ matrix.os }}
      - name: Update cache
        run: |
          rm -rf /tmp/.docker-buildx-cache
          mv /tmp/.docker-buildx-cache-new /tmp/.docker-buildx-cache
